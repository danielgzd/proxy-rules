name: Validate

on:
  push:
    paths:
      - "Clash/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm run check
