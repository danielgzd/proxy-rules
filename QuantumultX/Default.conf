# Quantumult X Default Rules
# Replace MOCK values before use.

[general]
server_check_url = https://www.gstatic.com/generate_204
geo_location_checker = disabled
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn

[server_local]
hysteria2=example.com:443, password=MOCK_PASSWORD, sni=example.com, skip-cert-verify=false, tag=MOCK-HYSTERIA2

[server_remote]
https://example.com/sub?token=MOCK_MAIN_SUBSCRIPTION_TOKEN, tag=主订阅, enabled=true
https://example.com/sub?token=MOCK_BACKUP_SUBSCRIPTION_TOKEN, tag=备用订阅, enabled=false

[policy]
static=AI, 美国节点, 新加坡节点, 日本节点, 自动选择, 全部节点
static=节点选择, 自动选择, 香港节点, 台湾节点, 日本节点, 新加坡节点, 美国节点, 全部节点, direct
static=流媒体, 节点选择, 香港节点, 台湾节点, 日本节点, 新加坡节点, 美国节点, 自动选择, 全部节点
static=开发服务, 节点选择, 美国节点, 新加坡节点, 日本节点, direct, 全部节点
static=社交媒体, 节点选择, 日本节点, 新加坡节点, 美国节点, 香港节点, 自动选择, 全部节点
static=云与软件, 节点选择, direct, 香港节点, 日本节点, 新加坡节点, 美国节点, 自动选择
url-latency-benchmark=自动选择, server-tag-regex=^(?!.*(?i)(剩余|流量|套餐|官网|网站|到期|重置|订阅|收藏|超时|通知|公告|客服|工单|倍率|Traffic|Expire|Subscription|Official|Website)).*, check-interval=300, tolerance=80
static=香港节点, server-tag-regex=(?i)(香港|\bHK\b|Hong Kong)
static=台湾节点, server-tag-regex=(?i)(台湾|台灣|\bTW\b|Taiwan|Taipei)
static=日本节点, server-tag-regex=(?i)(日本|东京|東京|大阪|\bJP\b|Japan|Tokyo|Osaka)
static=新加坡节点, server-tag-regex=(?i)(新加坡|狮城|獅城|\bSG\b|Singapore)
static=美国节点, server-tag-regex=(?i)(美国|美國|\bUS\b|USA|United States|Los Angeles|San Jose|Seattle|New York)
static=全部节点, server-tag-regex=^(?!.*(?i)(剩余|流量|套餐|官网|网站|到期|重置|订阅|收藏|超时|通知|公告|客服|工单|倍率|Traffic|Expire|Subscription|Official|Website)).*
static=最终兜底, 节点选择, 自动选择, direct

[filter_local]
host-suffix, deepseek.com, direct
host-suffix, deepseek.cn, direct
host-suffix, kimi.moonshot.cn, direct
host-suffix, moonshot.cn, direct
host-suffix, doubao.com, direct
host-suffix, volces.com, direct
host-suffix, qwen.ai, direct
host-suffix, tongyi.aliyun.com, direct
host-suffix, zhipuai.cn, direct
host-suffix, chatglm.cn, direct
host-suffix, minimax.chat, direct
host-suffix, voice.google.com, 美国节点
host-suffix, googletelephony.com, 美国节点
host-suffix, push.apple.com, direct
final, 最终兜底

