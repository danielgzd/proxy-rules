[custom]
; OpenClash fine routing template
; Design:
; - Let OpenClash decide DNS and routing for traffic that enters the core.
; - Route by application type, then let each application choose a region group.
; - Keep direct/private/CN traffic early, application rules in the middle, and
;   GFW / non-standard ports / FINAL as layered fallbacks.

enable_rule_generator=true
overwrite_original_rules=true

; Remove airport metadata, usage notices and subscription hints from node groups.
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|TG群|Telegram群|电报群|频道|说明|使用说明|QQ群|客服|工单|订阅|收藏|超时|Expire|Traffic|Reset|Remaining|Official|Website|Subscription|Favorite|Timeout

; ==========================================================
; 1. Rules: top to bottom
; ==========================================================

; Adobe is intentionally placed first, so it can be proxied or rejected in one group.
ruleset=Adobe,[]GEOSITE,adobe
ruleset=Adobe,[]GEOIP,adobe,no-resolve

; Local and private traffic.
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; Practical OpenClash direct/proxy patches.
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
ruleset=节点选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=节点选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; China and China-friendly traffic. Domestic AI stays direct.
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=DIRECT,[]GEOSITE,category-ai-cn
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; Application routing.
ruleset=AI,[]GEOSITE,category-ai-!cn
ruleset=Telegram,[]GEOSITE,telegram
ruleset=Telegram,[]GEOIP,telegram,no-resolve
ruleset=流媒体,[]GEOSITE,youtube
ruleset=流媒体,[]GEOSITE,netflix
ruleset=流媒体,[]GEOIP,netflix,no-resolve
ruleset=流媒体,[]GEOSITE,disney
ruleset=流媒体,[]GEOSITE,spotify
ruleset=社交媒体,[]GEOSITE,tiktok
ruleset=社交媒体,[]GEOIP,tiktok,no-resolve
ruleset=社交媒体,[]GEOSITE,instagram
ruleset=社交媒体,[]GEOSITE,twitter
ruleset=开发服务,[]GEOSITE,github
ruleset=开发服务,[]GEOIP,github,no-resolve
ruleset=开发服务,[]GEOSITE,category-speedtest
ruleset=交易所,[]GEOSITE,okx
ruleset=交易所,[]GEOSITE,binance
ruleset=交易所,[]GEOSITE,bybit
ruleset=云与软件,[]GEOSITE,google
ruleset=云与软件,[]GEOIP,google,no-resolve
ruleset=云与软件,[]GEOSITE,microsoft
ruleset=云与软件,[]GEOIP,microsoft,no-resolve
ruleset=云与软件,[]GEOSITE,cloudflare
ruleset=云与软件,[]GEOIP,cloudflare,no-resolve
ruleset=云与软件,[]GEOSITE,apple

; Layered fallback.
ruleset=节点选择,[]GEOSITE,gfw
ruleset=非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=漏网之鱼,[]FINAL

; ==========================================================
; 2. Application groups
; ==========================================================

custom_proxy_group=AI`select`[]美国节点`[]新加坡节点`[]日本节点`[]香港节点`[]台湾节点`[]冷门节点`[]自动选择`[]全部节点
custom_proxy_group=Telegram`select`[]新加坡节点`[]香港节点`[]美国节点`[]日本节点`[]冷门节点`[]自动选择`[]全部节点
custom_proxy_group=流媒体`select`[]节点选择`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]冷门节点`[]自动选择`[]全部节点
custom_proxy_group=社交媒体`select`[]节点选择`[]日本节点`[]新加坡节点`[]美国节点`[]香港节点`[]冷门节点`[]自动选择`[]全部节点
custom_proxy_group=开发服务`select`[]节点选择`[]美国节点`[]新加坡节点`[]日本节点`[]香港节点`[]冷门节点`[]自动选择`[]DIRECT`[]全部节点
custom_proxy_group=交易所`select`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]冷门节点`[]节点选择`[]DIRECT
custom_proxy_group=云与软件`select`[]节点选择`[]DIRECT`[]香港节点`[]日本节点`[]新加坡节点`[]美国节点`[]冷门节点`[]自动选择
custom_proxy_group=Adobe`select`[]REJECT`[]DIRECT`[]节点选择`[]美国节点`[]日本节点`[]新加坡节点`[]全部节点
custom_proxy_group=非标端口`select`[]遵循规则`[]DIRECT`[]节点选择
custom_proxy_group=遵循规则`select`[]漏网之鱼

; ==========================================================
; 3. Fallback and node groups
; ==========================================================

custom_proxy_group=节点选择`select`[]自动选择`[]香港节点`[]台湾节点`[]日本节点`[]新加坡节点`[]美国节点`[]冷门节点`[]全部节点`[]DIRECT
custom_proxy_group=漏网之鱼`select`[]节点选择`[]自动选择`[]冷门节点`[]全部节点`[]DIRECT

custom_proxy_group=自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,80
custom_proxy_group=香港节点`url-test`(?i)(香港|\\bHK\\b|Hong Kong|HongKong)`https://www.gstatic.com/generate_204`300,,80
custom_proxy_group=台湾节点`url-test`(?i)(台湾|台灣|\\bTW\\b|Taiwan|Taipei|Hinet)`https://www.gstatic.com/generate_204`300,,80
custom_proxy_group=日本节点`url-test`(?i)(日本|东京|東京|大阪|\\bJP\\b|Japan|Tokyo|Osaka)`https://www.gstatic.com/generate_204`300,,80
custom_proxy_group=新加坡节点`url-test`(?i)(新加坡|狮城|獅城|\\bSG\\b|Singapore)`https://www.gstatic.com/generate_204`300,,80
custom_proxy_group=美国节点`url-test`(?i)(美国|美國|\\bUS\\b|USA|United States|Los Angeles|San Jose|Seattle|New York|洛杉矶|洛杉磯|圣何塞|聖何塞|西雅图|西雅圖|纽约|紐約)`https://www.gstatic.com/generate_204`300,,80
custom_proxy_group=冷门节点`select`(?i)^(?!.*(香港|\\bHK\\b|Hong Kong|HongKong|台湾|台灣|\\bTW\\b|Taiwan|Taipei|日本|东京|東京|大阪|\\bJP\\b|Japan|Tokyo|Osaka|新加坡|狮城|獅城|\\bSG\\b|Singapore|美国|美國|\\bUS\\b|USA|United States|Los Angeles|San Jose|Seattle|New York)).*
custom_proxy_group=全部节点`select`.*
